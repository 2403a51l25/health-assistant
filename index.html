<!DOCTYPE html>
<html>
<head>
    <title>Health Assistant</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #36d1dc, #5b86e5);
            text-align: center;
        }
        .box {
            background: white;
            padding: 20px;
            margin: 40px auto;
            width: 90%;
            max-width: 400px;
            border-radius: 10px;
        }
        input, button {
            margin: 5px;
            padding: 8px;
        }
        button {
            background: blue;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<div class="box">
<h2>AI Smart Health Assistant</h2>

<form action="/predict" method="post">
    <input type="checkbox" name="fever"> Fever<br>
    <input type="checkbox" name="cough"> Cough<br>
    <input type="checkbox" name="headache"> Headache<br>
    <input type="checkbox" name="fatigue"> Fatigue<br>
    <input type="checkbox" name="bodypain"> Body Pain<br>
    <input type="checkbox" name="cold"> Cold<br><br>

    <input type="text" name="bp" placeholder="BP (120/80)"><br>
    <input type="text" name="temp" placeholder="Temperature (98.6)"><br>
    <input type="text" name="hr" placeholder="Heart Rate"><br>
    <input type="text" name="sugar" placeholder="Sugar Level"><br><br>

    <button type="submit">Predict</button>
</form>

{% if prediction %}
<h3>Result: {{ prediction }}</h3>
<p><b>Advice:</b> {{ advice }}</p>
{% endif %}

</div>

</body>
</html>
